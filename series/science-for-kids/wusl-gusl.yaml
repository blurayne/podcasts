    dur: 2
  keks_mampf:
    prompt: "close-up cookie crunching and happy munching, cute cartoon style, dry, no reverb tail"
    dur: 3

music:
  mystery_bed:
    prompt: "sparse mysterious ambient underscore, slow, subtle, cosmic, loopable, no melody, no vocals"
    ms: 30000
  workshop_atmo:
    prompt: "very soft inventor's-workshop atmosphere bed: gentle electronic hums, faint bubbling and distant soft beeps, warm and playful, loopable, no melody, no vocals"
    ms: 30000
  title_motif:
    prompt: "playful wacky kids-science fanfare, upbeat, quirky, sense of invention and wonder, no vocals, short"
    ms: 8000
  transition:
    prompt: "short playful stinger, curious wacky kids-science transition, 2-3 notes, light, no vocals"
    ms: 3000

cue_rules:
  # music / action cues FIRST (specific) so the greedy sfx keyword "piep" does not
  # steal cues like "Warme Musik… piepen" (§14).
  # NOTE: the §12 "geheimnisvoller/ruhiger" mystery_bed cue was removed — §12 now
  # plays Einspieler 13, which carries its OWN mysterious music bed; a second bed
  # here would double the music over the insert. The §14 outro bed stays.
  - keywords: ["ausblenden"]
    action: outro
  - keywords: ["musik hoch"]
    action: outro
  - keywords: ["warme musik"]
    music: workshop_atmo
    action: bed_on
  # sfx cues
  - keywords: ["mampf"]
    sfx: keks_mampf
  - keywords: ["schwupp"]
    sfx: schwupp
  - keywords: ["fiepen"]
    sfx: schwupp
  - keywords: ["pling"]
    sfx: pling
  - keywords: ["toaster"]
    sfx: plopp
  - keywords: ["ploppen"]
    sfx: plopp
  - keywords: ["krack"]
    sfx: krack
  - keywords: ["zisch"]
    sfx: krack
  - keywords: ["krawumms"]
    sfx: krawumms
  - keywords: ["trommelwirbel"]
    sfx: trommelwirbel
  - keywords: ["boing"]
    sfx: boing
  - keywords: ["feder"]
    sfx: boing
  - keywords: ["wubwub"]
    sfx: device_beep
  - keywords: ["piep"]
    sfx: device_beep

