# ebenfalls gestrippt: der natürliche Satzrhythmus trägt die Pause.
audio_tags:
  pause:    ""
  liest:    ""
  blättert: ""
  trocken:  ""

# ---------------- Vierschicht-Akkord: vier Einzeltöne (SFX, punktuell) ----------------
# Die Schichten werden je Akt EINGEFÜHRT und stehen im Finale gemeinsam.
sfx:
  swipe:
    prompt: "very short dry swipe click, like swiping a phone screen, single crisp tick, no reverb tail"
    dur: 1
  summen:
    prompt: "single sustained low machine hum tone, a steady electric server-room drone note, clean, no rhythm, holds"
    dur: 3
  stempel:
    prompt: "single official rubber stamp thud on paper, bureaucratic, dry, one firm impact, no reverb"
    dur: 1
  feed:
    prompt: "short social-media feed swipe whoosh followed immediately by a soft camera shutter click, crisp, no reverb"
    dur: 1
  tippen:
    prompt: "quiet smartphone screen typing, soft finger taps on glass, intimate, close, no room tone"
    dur: 2
  brief:
    prompt: "a paper envelope being torn open and a letter unfolded, single clean gesture, dry"
    dur: 2
  kamera:
    prompt: "single soft camera record beep followed by a birdsong audio file cutting off abruptly, crisp"
    dur: 2
  akte:
    prompt: "court file pages being turned, single page rustle, brief, clean"
    dur: 1
  # ---- Atmosphäre-Betten (länger, geloopt/gestreut — kein Tight-Loop) ----
  atmo_nacht:
    prompt: "quiet dark night bedroom room tone, very sparse, faint distant city hum, intimate late-night stillness, seamless loop, no music"
    dur: 20
  atmo_kueche:
    prompt: "quiet domestic morning kitchen ambience, faint fridge hum, a distant clink, calm, seamless loop, no music"
    dur: 16
  atmo_flur:
    prompt: "muffled courthouse corridor ambience, faint reverberant hall, occasional distant footsteps on stone, institutional, seamless loop, no music"
    dur: 16
  atmo_saal:
    prompt: "large echoey courtroom tone, faint reverberant space, occasional distant paper rustle, sober, seamless loop, no music"
    dur: 16
  atmo_landhaus:
    prompt: "warm country farmhouse kitchen ambience, gentle morning birdsong, cozy analog, seamless loop, no music"
    dur: 18

# ---------------- Chord stings (music, vor-geschichtet, wachsende Dichte) ----------------
music:
  title_motif:
    prompt: "Observatory series title signature: a solemn four-note sustained chord layered from a low swipe-tick pulse, a steady machine hum, a bureaucratic stamp resonance and a bright feed-whoosh overtone, cinematic, dark, slow, no drums, no vocals"
    ms: 18000
  akkord_zwei:
    prompt: "Short two-layer transition sting: a low swipe-tick pulse plus a sustained machine hum tone, two stacked notes, cold and rising, unobtrusive, no drums, no vocals"
    ms: 7000
  akkord_drei:
    prompt: "Short three-layer transition sting: swipe-tick pulse plus machine hum plus a bureaucratic stamp resonance, three stacked notes, denser and darker than before, no drums, no vocals"
    ms: 8000
  vierklang:
    prompt: "Full four-layer chord landing: swipe-tick pulse, machine hum, bureaucratic stamp resonance and a bright feed-whoosh overtone all sounding together, a stacked cinematic chord that holds and resolves, dark and grand, no drums, no vocals"
    ms: 12000

cue_rules:
  # --- Leitmotiv / Titelsignatur ---
  - { keywords: ["musik", "titelmotiv", "intro"],       music: title_motif, action: stinger }
  - { keywords: ["musik", "titelmotiv", "signatur"],    music: title_motif, action: stinger }
  - { keywords: ["musik", "akkord", "zwei"],            music: akkord_zwei, action: stinger }
  - { keywords: ["musik", "akkord", "drei"],            music: akkord_drei, action: stinger }
  - { keywords: ["musik", "vierklang", "halten"],       music: vierklang,   action: bed_on }
  - { keywords: ["musik", "vierklang"],                 music: vierklang,   action: stinger }
  - { keywords: ["musik", "ausblenden"],                music: title_motif, action: outro }
  # --- Vierschicht-Einzeltöne (SFX) ---
  - { keywords: ["sfx", "swipe"],                       sfx: swipe }
  - { keywords: ["sfx", "summen"],                      sfx: summen }
  - { keywords: ["sfx", "stempel"],                     sfx: stempel }
  - { keywords: ["sfx", "feed"],                        sfx: feed }
  - { keywords: ["sfx", "tippen"],                      sfx: tippen }
  - { keywords: ["sfx", "brief"],                       sfx: brief }
  - { keywords: ["sfx", "kamera"],                      sfx: kamera }
  - { keywords: ["sfx", "akte"],                        sfx: akte }
  # --- Atmosphäre-Betten ---
  - { keywords: ["atmo", "nacht"],                      sfx: atmo_nacht }
  - { keywords: ["atmo", "küche"],                      sfx: atmo_kueche }
  - { keywords: ["atmo", "flur"],                       sfx: atmo_flur }
  - { keywords: ["atmo", "saal"],                       sfx: atmo_saal }
  - { keywords: ["atmo", "landhaus"],                   sfx: atmo_landhaus }

gaps:
  base:     0.55
  switch:   0.90
  sfx_tail: 0.35
  act:      1.60
  pause:    0.80

output:
  final: podcast.mp3
  loudnorm: "I=-16:TP=-1.5:LRA=11"
