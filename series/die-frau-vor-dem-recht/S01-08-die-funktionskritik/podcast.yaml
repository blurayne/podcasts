  untermalung:
    prompt: "Sparse, dezent, loopable ambient underscore for a serious analytical documentary, soft low strings, no melody, no drums, barely audible, institutional mood"
    ms: 32000

cue_rules:
  - { keywords: ["musik", "titelmotiv", "intro"],   music: title_motif, action: intro }
  - { keywords: ["musik", "ausblenden"],             music: title_motif, action: outro }
  - { keywords: ["musik", "aus"],                    music: title_motif, action: outro }
  - { keywords: ["musik", "trenner"],                music: transition,  action: stinger }
  - { keywords: ["musik", "übergang"],               music: transition,  action: stinger }
  - { keywords: ["musik", "untermalung"],            music: untermalung, action: bed_on }
  - { keywords: ["atmo", "saal"],                    sfx: saal }
  - { keywords: ["atmo", "akte"],                    sfx: akte }
  - { keywords: ["atmo"],                            sfx: saal }

