slug: die-frau-vor-dem-recht/S01-04/podcast
kind: podcast
title: "Die Frau vor dem Recht — Der Matriarchat-Gegentest"
model: eleven_v3
transcript: series/die-frau-vor-dem-recht/S01-04-matriarchat-gegentest/podcast.md

speakers:
  STIMME 1:
    voice_id:     "dCnu06FiOZma2KVNUoPZ"
    speaker_key:  s1
    stability:    0.50
  STIMME 2:
    voice_id:     "2OcnG4mH3jIMtWz3vKus"
    speaker_key:  s2
    stability:    0.60

strip_latex: true

sfx:
  atmo_steppe:
    prompt: "Ambient bed: open steppe wind, distant hoofbeats fading, a sparse dry landscape, no music, seamless loop"
    dur: 12
  atmo_markt:
    prompt: "Ambient bed: a distant bazaar, many overlapping quiet voices, a light breeze, no music, seamless loop"
    dur: 12

music:
  title_motif:
    prompt: "Solemn documentary title motif: a low sustained dark string pad with a slow cello or double-bass ostinato, spare, contemplative, cinematic, no drums, no vocals, no ethnic flourish"
    ms: 24000
  transition:
    prompt: "Short neutral documentary transition: a single low cello note over a soft rising sustained string tone, unobtrusive, no vocals, under 8 seconds"
    ms: 8000

cue_rules:
  - { keywords: ["musik", "titelmotiv"],   music: title_motif, action: intro }
  - { keywords: ["musik", "titelmotif"],   music: title_motif, action: intro }
  - { keywords: ["musik", "trenner"],      music: transition,  action: stinger }
  - { keywords: ["musik", "übergang"],     music: transition,  action: stinger }
  - { keywords: ["musik", "ausblenden"],   music: title_motif, action: outro }
  - { keywords: ["musik", "aus."],         music: title_motif, action: outro }
  - { keywords: ["musik", "aus"],          music: title_motif, action: outro }
  - { keywords: ["atmo", "steppe"],        sfx: atmo_steppe }
  - { keywords: ["atmo", "galopp"],        sfx: atmo_steppe }
  - { keywords: ["atmo", "wind"],          sfx: atmo_steppe }
  - { keywords: ["atmo", "markt"],         sfx: atmo_markt }
  - { keywords: ["atmo", "stimmen"],       sfx: atmo_markt }
  - { keywords: ["atmo"],                  sfx: atmo_steppe }

gaps:
  base:     0.70
  switch:   0.95
  sfx_tail: 0.35
  act:      1.60
  pause:    1.00

output:
  final: podcast.mp3
  loudnorm: "I=-16:TP=-1.5:LRA=11"
