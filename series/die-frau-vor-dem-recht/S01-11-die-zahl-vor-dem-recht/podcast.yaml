# ---------------------------------------------------------------- SFX
sfx:
  saal_atmo:
    prompt: "quiet German courtroom room tone, subtle paper shuffling, a chair creaks once, muted footsteps, sober, no music, no gavel"
    dur: 10
  glocke:
    prompt: "single small courtroom session bell, one clean strike, dry, short decay"
    dur: 2
  aktenstempel:
    prompt: "single heavy office ink stamp hitting paper on a wooden desk, dry, authoritative, short"
    dur: 1
  muenze:
    prompt: "a single coin dropped on stone, bouncing then spinning out slowly to rest, close, clean, no reverb tail"
    dur: 5
  muenze_kurz:
    prompt: "a single coin tipping over and settling on a wooden table, short, quiet, clean"
    dur: 2
  papier_riss:
    prompt: "a small strip of paper being torn off slowly, quiet, close-miked, single tear"
    dur: 2
  akte_zu:
    prompt: "a thick cardboard case file being closed softly and placed flat on a desk, quiet, final, no reverb"
    dur: 2

# ---------------------------------------------------------------- MUSIC
music:
  titel_motiv:
    prompt: "sober documentary title motif, low strings and a sparse piano, dignified, restrained tension, courtroom gravity, no percussion, no vocals"
    ms: 10000
  doku_bett:
    prompt: "calm documentary underscore bed, soft piano pulses and warm sustained strings, reflective, unobtrusive, loopable, no vocals"
    ms: 30000
  welt_bett:
    prompt: "quiet travelling documentary bed, gentle plucked strings and soft airy pads, sense of maps and distance, unobtrusive, loopable, no vocals"
    ms: 30000

# ---------------------------------------------------------------- CUE RULES
cue_rules:
  # outro first (specific)
  - keywords: ["ausblenden"]
    action: outro
  - keywords: ["musik hoch"]
    action: outro
  # music beds for the two inserts
  - keywords: ["dokumentarisches musikbett"]
    music: doku_bett
    action: bed_on
  - keywords: ["zweites", "musikbett"]
    music: welt_bett
    action: bed_on
  - keywords: ["musikbett läuft aus"]
    action: bed_off
  - keywords: ["musikbett aus"]
    action: bed_off
  # sfx
  - keywords: ["aktenstempel"]
    sfx: aktenstempel
  - keywords: ["glocke"]
    sfx: glocke
  - keywords: ["akte klappt"]
    sfx: akte_zu
  - keywords: ["papier reißt"]
