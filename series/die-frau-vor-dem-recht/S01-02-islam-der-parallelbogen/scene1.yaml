hoerspiel:
  name: scene1
  narr_heraus: "Wie realistisch ist diese Szene? Eine kurze Einordnung."
  bed_sfx: atmo_base
  reverb_roles: []

  voices:
    SPRECHER:   "dCnu06FiOZma2KVNUoPZ"
    KHADIDSCHA: "7eVMgwCnXydb3CikjV7a"
    NAFISA:     "uvysWDLbKpA4XvpD3GI6"
    MAISARA:    "FTNCalFNG5bRnkkaP5Ug"

  display:
    SPRECHER:   "ERZÄHLER"
    KHADIDSCHA: "KHADIDSCHA"
    NAFISA:     "NAFISA"
    MAISARA:    "MAISARA"

  analysis_list:
    - "Der Kern ist mehrfach belegt und im Milieu plausibel: Khadidscha war eine vermögende Fernhandelskauffrau, stellte Muhammad für ihre Syrien-Karawane an, war mit dem Ergebnis zufrieden und ließ die Eheanbahnung selbst ausgehen — über ihre Vertraute Nafisa. Auch der Beiname al-Amin, ihre zwei früheren Ehen und die Monogamie bis zu ihrem Tod stehen so in den ältesten Sira-Quellen: Ibn Ishaq, Ibn Sa'd."
    - "Vorbehalt: Diese Quellen sind erst 150 bis 200 Jahre später verschriftet, gesichert ist das Bild, nicht jedes Detail; ihr Alter — 40 oder 28 — bleibt umstritten. Dass eine selbstständige Kauffrau mit eigener Partnerwahl möglich war, gilt der Forschung als plausibel. Khadidscha ist das arabische Gegenstück zur húsfreyja: Beweis des Möglichen, nicht des Garantierten — der Vertrag wird im Kontor beschlossen, im Männerkreis gesprochen."

  drama:
    - { cue: atmo_base, gain: 0.8 }
    - { id: "00_narr_in", who: SPRECHER, gap: 0.0, text: "Mekka, gut dreißig Jahre bevor es eine neue Weltreligion geben wird. Eine Handelsstadt ohne König, regiert von Sippen und Verträgen. In einem Kontor unweit des Heiligtums sitzt eine Frau über ihren Listen, die zweimal verwitwet ist, die nicht wieder verheiratet wurde — und die es sich leisten kann, dass das so bleibt." }
    - { id: "01_maisara", who: MAISARA, gap: 0.6, text: "Herrin — die Ballen aus Busra sind verkauft, alle. Der Gewinn liegt über dem, was dein Vetter im letzten Jahr gemacht hat. Fast das Doppelte." }
    - { id: "02_khadidscha", who: KHADIDSCHA, gap: 0.4, tag: "[calm]", text: "Fast das Doppelte. Und die Karawane? Verluste, Streit, Zoll?" }
    - { id: "03_maisara", who: MAISARA, gap: 0.4, text: "Nichts davon. Der Mann, den du angestellt hast — der Sohn Abdallahs, aus dem Haus Haschim — er handelt … er handelt, als gehöre die Ware ihm, und rechnet ab, als gehöre sie dir. Die Leute in Busra nannten ihn al-Amin. Den Zuverlässigen." }
    - { id: "04_khadidscha", who: KHADIDSCHA, gap: 0.5, text: "Den Zuverlässigen. Nafisa." }
    - { id: "05_nafisa", who: NAFISA, gap: 0.4, text: "Ich kenne dieses Gesicht. Das ist nicht das Gesicht einer Frau, die über Warenballen nachdenkt." }
    - { id: "06_khadidscha", who: KHADIDSCHA, gap: 0.4, text: "Es ist das Gesicht einer Frau, die rechnet. Ich habe zwei Männer überlebt und mehr Vermögen gemehrt als die meisten Männer dieser Stadt. Jeder dritte Haushalt am Basar hat mich für seine Söhne gefragt — und ich habe jeden dritten Haushalt abgewiesen, denn sie fragten nicht nach mir, sie fragten nach meinen Karawanen. Dieser eine fragt nach gar nichts. Das gefällt mir." }
    - { id: "07_nafisa", who: NAFISA, gap: 0.4, text: "Und was soll ich tun?" }
    - { id: "08_khadidscha", who: KHADIDSCHA, gap: 0.4, text: "Was du am besten kannst: Geh zu ihm und stelle Fragen, die wie Plaudern klingen. Warum er nicht heiratet. Ob es am Brautgeld liegt. Und wenn er antwortet, wie ich glaube, dass er antwortet — dann frag ihn, was er zu einer Frau sagen würde, die Vermögen hat, Ansehen hat und ihn nicht nach seinem Besitz fragt." }
    - { id: "09_nafisa", who: NAFISA, gap: 0.4, tag: "[laughs]", text: "Du lässt ihn werben, indem du wirbst." }
    - { id: "10_khadidscha", who: KHADIDSCHA, gap: 0.4, text: "Ich lasse ihn frei antworten. Das ist mehr, als diese Stadt ihren Töchtern gewährt. Meinen Oheim brauche ich am Ende für den Vertrag — einen Mann, der spricht, was ich beschlossen habe. So läuft es hier: Beschlossen wird im Kontor, gesprochen wird im Männerkreis. Geh, Nafisa." }
    - { cue: footsteps_recede, gain: 0.7 }
    - { id: "11_narr_out", who: SPRECHER, gap: 0.6, text: "Sie werden heiraten. Fünfundzwanzig Jahre lang, bis zu ihrem Tod, wird sie seine einzige Frau sein — in einer Stadt, in der Männern von Stand keine Zahl gesetzt ist. Und als er Jahre später zitternd von einer Erscheinung im Berg zurückkehrt, wird der erste Mensch, der ihm glaubt, diese Kauffrau sein. Der erste Muslim der Geschichte — nach allem, was die Überlieferung sagt — war eine Geschäftsfrau, die ihren Angestellten geheiratet hat." }
