model: eleven_v3

sfx:
  atmo_base:
    prompt: "A Middle-Eastern bazaar in Mecca at middle distance: camels grunting, merchants calling out, distant hammer strokes on metal; nearer, the soft clicking of counting stones and cloth being unrolled"
