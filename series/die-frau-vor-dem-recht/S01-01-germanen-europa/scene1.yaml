  drama:
    - { id: "00_narr_in",  who: SPRECHER, gap: 0.0,  text: "Um das Jahr 90 nach Christus, östlich des Rheins. Ein Stamm versammelt sich zum Thing — der Versammlung der freien, waffenfähigen Männer. Frauen haben hier kein Rederecht. Und doch stehen an diesem Tag zwei Frauen im Zentrum: eine Seherin, deren Wort als göttlich gilt — und eine Frau, die aus dem Nachbarstamm hierher verheiratet wurde. Hören wir hinein." }
    - { cue: spear_shield_3, gain: 0.9 }
    - { id: "01_priester", who: PRIESTER, gap: 0.8,  text: "[shouting] Schweigt! [calm] Das Thing ist eröffnet. Wer das Wort führt, führt es geordnet — oder er schweigt. So wollen es die Götter." }
    - { id: "02_segimer",  who: SEGIMER,  gap: 0.6,  text: "Ihr kennt den Grund. Das Feld am Erlenbach — dreimal in drei Sommern haben ihre Leute die Ernte eingeholt. Unser Korn. Unser Boden." }
    - { id: "03_folkwin",  who: FOLKWIN,  gap: 0.35, tag: "[shouting]", text: "Dann ziehen wir hinüber und holen es uns zurück! Mit dem Speer, nicht mit Worten!" }
    - { cue: grollen, gain: 0.7 }
    - { id: "04_segimer",  who: SEGIMER,  gap: 0.7,  text: "Und dann? Fehde. Tote auf beiden Seiten. Ihre Sippe gegen unsere, Sommer um Sommer. Folkwin, du zählst die Klingen. Zähl auch die Gräber." }
    - { id: "05_priester", who: PRIESTER, gap: 0.5,  text: "Der Stamm am Fluss ist uns durch Eid und Heirat verbunden. Wer bricht, bricht auch den Frieden der Götter." }
    - { id: "06_segimer",  who: SEGIMER,  gap: 0.5,  text: "Darum frage ich, bevor ein Speer fliegt: Was sagt die, die weiter sieht als wir? Man rufe die Seherin." }
    - { cue: hush_gust, gain: 0.8 }
    - { id: "07_waluburg", who: WALUBURG, gap: 0.9,  tag: "[calm]",     text: "Ich stehe nicht in eurem Ring, Männer — das Recht des Rings ist nicht mein Recht. Aber ich lese das Los, und ich lese den Fluss. Ich sehe Rauch über dem Erlenbach, wenn ihr die Speere nehmt. Ich sehe eure Höfe leer." }
    - { id: "08_folkwin",  who: FOLKWIN,  gap: 0.6,  tag: "[whispers]", text: "…und wenn wir warten?" }
    - { id: "09_waluburg", who: WALUBURG, gap: 0.4,  tag: "[calm]",     text: "Dann lebt, wer jetzt lebt. Die Götter geben kein Recht auf Blut vor dem neuen Mond." }
    - { cue: raunen, gain: 0.6 }
    - { id: "10_segimer",  who: SEGIMER,  gap: 0.7,  text: "Ihr hört sie. — Aber es ist noch eine hier, die beide Ufer kennt. Swanhild, du kamst von ihnen zu uns. Tritt heran. Nicht um zu richten — um zu sagen, was du weißt." }
    - { cue: steps_surprise, gain: 0.6 }
    - { id: "11_swanhild", who: SWANHILD, gap: 0.7,  tag: "[calm]",     text: "Ich bin Herd und Hand in Segimers Haus. Aber meine Mutter wohnt am Erlenbach. — Ihr nennt es Diebstahl. Sie nennen es ihr altes Recht: Ihr Großvater habe das Feld gerodet, ehe euer Zaun stand." }
    - { id: "12_folkwin",  who: FOLKWIN,  gap: 0.3,  tag: "[angry]",    text: "Also lügen sie!" }
    - { id: "13_swanhild", who: SWANHILD, gap: 0.4,  text: "Nein. Sie erinnern anders. Und darum: Schickt keine Speere. Schickt mich. Ich bin die Brücke — solange die Brücke hält. Mein Sohn trägt euer Blut und ihres. Wollt ihr, dass er einen Onkel erschlägt?" }
    - { id: "14_segimer",  who: SEGIMER,  gap: 0.8,  text: "… Ein Bote statt einer Klinge. Geiseln zum Pfand, bis das Feld geteilt ist. Wer ist dafür?" }
    - { cue: spears_vote, gain: 0.85 }
    - { id: "15_priester", who: PRIESTER, gap: 1.2,  text: "[shouting] Die Waffen sprechen! [calm] Der Stamm hat entschieden: erst das Wort, dann — wenn es sein muss — der Speer." }
