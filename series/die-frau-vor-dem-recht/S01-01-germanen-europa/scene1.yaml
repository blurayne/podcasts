  sfx:
    atmo_base:
      prompt: "Ancient Germanic tribal assembly on an open windswept field: steady wind, distant cowbells, low murmur of a large crowd of men, occasional birdsong, no music"
      auto: true
    spear_shield_3:
      prompt: "A spear shaft striking a wooden shield three times, three sharp hard wooden knocks"
      dur: 3
    grollen:
      prompt: "A crowd of warriors growling in approval, a few spear shafts clashing"
      dur: 3
    hush_gust:
      prompt: "A murmuring crowd growing reverently silent, slow footsteps on earth, a gust of wind"
      dur: 4
    raunen:
      prompt: "An impressed crowd of people murmuring quietly in awe"
      dur: 3
    steps_surprise:
      prompt: "A few footsteps approaching on earth, a crowd murmuring in surprise"
      dur: 3
    spears_vote:
      prompt: "Many spear shafts rhythmically beating against wooden shields, growing louder, a tribal war assembly voting yes in unison"
      dur: 6

  music:
    intro:
      prompt: "Dark solemn ancient Germanic ritual atmosphere: low sustained drone, a distant war horn, slow frame drum, ominous and sacred, cinematic, no vocals"
      ms: 26000
    bed:
      prompt: "Very soft neutral documentary underscore: sustained low strings, contemplative, minimal, unobtrusive, slow, no melody, no vocals"
      ms: 45000
