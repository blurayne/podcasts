name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Create pandoc stylesheet
        run: |
          cat > /tmp/pandoc-style.css << 'ENDCSS'
          *, *::before, *::after { box-sizing: border-box; }
          :root {
            --bg: #fafaf8; --card: #fff; --border: #e2e4e9;
            --text: #1a1c23; --muted: #6b7280;
            --accent: #b45309; --accent-h: #92400e;
            --quote-bg: #fef9f0; --quote-border: #d97706; --quote-text: #713f12;
            --code-bg: #f3f4f6; --link: #b45309;
          }
          @media (prefers-color-scheme: dark) {
            :root {
              --bg: #0d1117; --card: #161b22; --border: #30363d;
              --text: #e6edf3; --muted: #8b949e;
              --accent: #f59e0b; --accent-h: #fbbf24;
              --quote-bg: #1f2937; --quote-border: #d97706; --quote-text: #fbbf24;
              --code-bg: #1f2937; --link: #f59e0b;
            }
          }
          :root[data-theme="light"] {
            --bg: #fafaf8; --card: #fff; --border: #e2e4e9;
            --text: #1a1c23; --muted: #6b7280;
            --accent: #b45309; --accent-h: #92400e;
            --quote-bg: #fef9f0; --quote-border: #d97706; --quote-text: #713f12;
            --code-bg: #f3f4f6; --link: #b45309;
          }
          :root[data-theme="dark"] {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #e6edf3; --muted: #8b949e;
            --accent: #f59e0b; --accent-h: #fbbf24;
            --quote-bg: #1f2937; --quote-border: #d97706; --quote-text: #fbbf24;
            --code-bg: #1f2937; --link: #f59e0b;
          }
          html { font-size: 17px; }
          body {
            font-family: Georgia, 'Times New Roman', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            max-width: 820px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 4rem;
          }
          .back-nav {
            display: block;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: .825rem;
            color: var(--muted);
            text-decoration: none;
            margin-bottom: 2rem;
            padding: .5rem 0;
            border-bottom: 1px solid var(--border);
          }
          .back-nav:hover { color: var(--accent); }
          h1, h2, h3, h4, h5, h6 {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.3;
            letter-spacing: -.01em;
          }
          h1 { font-size: 1.9rem; margin: 0 0 1.5rem; padding-bottom: .6rem; border-bottom: 2px solid var(--accent); }
          h2 { font-size: 1.4rem; margin: 2.5rem 0 .75rem; color: var(--text); }
          h3 { font-size: 1.15rem; margin: 2rem 0 .5rem; color: var(--muted); }
          h4 { font-size: 1rem; margin: 1.5rem 0 .5rem; font-style: italic; color: var(--muted); }
          p { margin: 0 0 1rem; }
          a { color: var(--link); text-decoration: underline; }
          a:hover { color: var(--accent-h); }
          blockquote {
            border-left: 4px solid var(--quote-border);
            margin: 1.5rem 0;
            padding: .75rem 1.25rem;
            background: var(--quote-bg);
            color: var(--quote-text);
            font-style: italic;
            border-radius: 0 6px 6px 0;
          }
          blockquote p { margin: 0; }
          code {
            font-family: "Fira Code", "Cascadia Code", monospace;
            font-size: .875em;
            background: var(--code-bg);
            padding: .1em .4em;
            border-radius: 3px;
            border: 1px solid var(--border);
          }
          pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.25rem;
            overflow-x: auto;
            margin: 1.25rem 0;
          }
          pre code { background: none; border: none; padding: 0; font-size: .85rem; }
          strong { font-weight: 700; }
          em { font-style: italic; }
          hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
          ul, ol { padding-left: 1.5rem; margin: 0 0 1rem; }
          li { margin-bottom: .25rem; }
          table { width: 100%; border-collapse: collapse; font-size: .9rem; margin: 1.25rem 0; }
          th { background: var(--code-bg); font-family: sans-serif; text-align: left; padding: .5rem .75rem; border: 1px solid var(--border); }
          td { padding: .45rem .75rem; border: 1px solid var(--border); }
          tr:nth-child(even) td { background: var(--code-bg); }
          .theme-btn {
            position: fixed; bottom: 1.5rem; right: 1.5rem;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text); border-radius: 50%; width: 2.5rem; height: 2.5rem;
            cursor: pointer; font-size: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.15);
            display: flex; align-items: center; justify-content: center;
          }
          .theme-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
          @media (max-width: 600px) { body { padding: 1rem 1rem 3rem; } h1 { font-size: 1.5rem; } }
          ENDCSS

      - name: Build site
        run: |
          set -e
          mkdir -p _site

          # Copy all source files, excluding secrets and dev-only paths
          rsync -a \
            --exclude='.git/' \
            --exclude='_site/' \
            --exclude='scripts/' \
            --exclude='.env' \
            --exclude='mise.toml' \
            --exclude='.gitattributes' \
            --exclude='.gitignore' \
            . _site/

          # Pandoc template with back-link and theme toggle injected
          BEFORE_HTML=$(cat << 'ENDBEFORE'
          <a class="back-nav" href="javascript:void(0)" onclick="window.location.href=window.location.pathname.replace(/\/[^\/]+$/, '/')+'index.html'" id="backLink">← Zur Übersicht</a>
          <script>
          (function(){
            var parts = window.location.pathname.split('/').filter(Boolean);
            // Find index.html at repo root (one level below the GitHub Pages project path)
            var depth = parts.length - 2; // -1 for repo prefix, -1 for filename
            var back = '';
            for(var i = 0; i < depth; i++) back += '../';
            if(!back) back = './';
            document.getElementById('backLink').href = back + 'index.html';
          })();
          </script>
          ENDBEFORE
          )

          AFTER_HTML='<button class="theme-btn" id="themeToggle" title="Theme wechseln">☀️</button>
          <script>
          (function(){
            var root=document.documentElement,btn=document.getElementById("themeToggle");
            var stored=localStorage.getItem("theme");
            var dark=window.matchMedia("(prefers-color-scheme: dark)").matches;
            var t=stored||(dark?"dark":"light");
            function apply(x){root.setAttribute("data-theme",x);btn.textContent=x==="dark"?"☀️":"🌙";localStorage.setItem("theme",x);}
            apply(t);
            btn.addEventListener("click",function(){apply(root.getAttribute("data-theme")==="dark"?"light":"dark");});
          })();
          </script>'

          echo "$BEFORE_HTML" > /tmp/before.html
          echo "$AFTER_HTML"  > /tmp/after.html

          # Convert all .md files in _site to HTML using pandoc
          find _site -name "*.md" | while read mdfile; do
            htmlfile="${mdfile%.md}.html"
            # Extract title from first heading
            title=$(grep -m1 '^#' "$mdfile" | sed 's/^#* *//' | head -c 120)
            [ -z "$title" ] && title="$(basename "${mdfile%.md}")"

            pandoc "$mdfile" \
              --standalone \
              --embed-resources \
              --css=/tmp/pandoc-style.css \
              --metadata "title=$title" \
              --include-before-body=/tmp/before.html \
              --include-after-body=/tmp/after.html \
              -o "$htmlfile" 2>/dev/null || \
            pandoc "$mdfile" --standalone -o "$htmlfile" || \
            echo "Warning: could not convert $mdfile"
          done

          echo "Site build complete. Files:"
          find _site -name "*.html" | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
